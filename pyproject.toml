[tool.ruff]
line-length = 120

[tool.codespell]
dictionary = ["_tools/codespell-dict.txt", "-"]
ignore-words = "_tools/codespell-ignore.txt"
skip = [
    "_build/*",
    "_static/*",
    "_styleguides/*",
    "classes/*",
    ".github/*",
    "tutorials/i18n/locales.rst",
    "AUTHORS.md",
    "LICENSE.txt",
]
